# Cohere Embedding Model Specifications
# Source: https://docs.cohere.com/docs/embed (2026)

cohere_models:
  embed-v4.0:
    token_limit: 128000
    texts_per_request: 96
    context_length: 128000
    dimensions: [1536, 1024, 768, 512, 384, 256]
    default_dimension: 1536
    description: "Cohere Embed v4 - state of the art embeddings"
    # Story #1292 (AC1): documented Cohere per-token rate for TEXT embeddings
    # (image tokens are priced separately and are not relevant to temporal
    # per-commit indexing), read by
    # scripts/analysis/temporal_vector_projection.py instead of a bare
    # hard-coded literal. Source: https://docs.cohere.com/docs/how-does-cohere-pricing-work
    # and https://cohere.com/pricing (2026): Embed v4 = $0.12 per 1M text tokens.
    pricing_usd_per_million_tokens: 0.12

api_constraints:
  max_texts_per_request: 96
  safety_margin_percentage: 90
