{% extends "base.html" %}

{% block title %}Dashboard - CIDX Admin{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1>Dashboard</h1>
    <div class="dashboard-actions">
        <button
            id="refresh-btn"
            class="outline"
            onclick="refreshAll()"
        >
            Refresh
        </button>
    </div>
</div>

<p>Welcome, <strong>{{ username }}</strong>!</p>

<!-- System Health Section - Story #30 AC5: HTMX lazy-load -->
<section id="health-section" class="dashboard-section"
    hx-get="/admin/partials/dashboard-health"
    hx-trigger="load"
    hx-swap="innerHTML">
    <!-- Loading indicator shown until HTMX fetches health data -->
    <div class="loading-indicator">
        <h2>System Health</h2>
        <p>Loading health data...</p>
    </div>
</section>

<!-- Statistics Section -->
<section id="stats-section" class="dashboard-section">
    {% include "partials/dashboard_stats.html" %}
</section>

<script>
let autoRefreshInterval = null;
let _refreshInProgress = false;

// Shared fetch options - used by refreshAll() and dropdown handlers in dashboard_stats.html
var _fetchOpts = { credentials: 'same-origin' };

// ---- Persistent carousel state (survives #health-section DOM replacements) ----
// These variables live in the parent page scope and are never reset by partial refreshes.
var _nmCurrent = 0;      // currently visible slide index
var _nmPinned = false;   // true when user has clicked a dot to lock the slide
var _nmAutoId = null;    // setInterval handle for auto-cycling
var _nmStaleId = null;   // setInterval handle for stale-marker updates
var _NM_CYCLE_MS = 5000; // auto-cycle interval
var _NM_STALE_MS = 30000;// age threshold for "stale" badge

// Called by dashboard_health.html partial after it is injected into the DOM.
// Re-attaches event handlers and restores the current slide / pinned state
// without resetting _nmCurrent or _nmPinned.
window.nmRebindCarousel = function() {
    var carousel = document.getElementById('nm-carousel');
    if (!carousel) return; // node_metrics section not present

    var nodeCount = parseInt(carousel.dataset.nodeCount, 10);
    if (isNaN(nodeCount) || nodeCount < 1) return;

    // Clamp current index in case node count changed between refreshes
    if (_nmCurrent >= nodeCount) _nmCurrent = 0;

    // Re-apply the correct visible slide (DOM was just replaced)
    _nmShowSlide(_nmCurrent, nodeCount);

    // Restore pinned dot styling if pinned
    if (_nmPinned) {
        var dot = document.getElementById('nm-dot-' + _nmCurrent);
        document.querySelectorAll('.nm-dot').forEach(function(d) { d.classList.remove('pinned'); });
        if (dot) dot.classList.add('pinned');
    }

    // Only start auto-cycling for multi-node carousels
    if (nodeCount > 1 && !_nmPinned) {
        _nmStartAuto(nodeCount);
    }

    // Restart stale marker updates (old interval was cleared with previous DOM)
    if (_nmStaleId) clearInterval(_nmStaleId);
    _nmStaleId = setInterval(function() { _nmUpdateStale(nodeCount); }, 5000);
};

function _nmShowSlide(idx, nodeCount) {
    for (var i = 0; i < nodeCount; i++) {
        var slide = document.getElementById('nm-slide-' + i);
        var dot = document.getElementById('nm-dot-' + i);
        if (slide) slide.style.display = (i === idx) ? '' : 'none';
        if (dot) dot.classList.toggle('active', i === idx);
    }
    _nmCurrent = idx;
    var label = document.getElementById('nm-node-label');
    var activeSlide = document.getElementById('nm-slide-' + idx);
    if (label && activeSlide) label.textContent = '(' + activeSlide.dataset.nodeId + ')';
    _nmUpdateStale(nodeCount);
}

function _nmUpdateStale(nodeCount) {
    var now = Date.now();
    for (var i = 0; i < nodeCount; i++) {
        var slide = document.getElementById('nm-slide-' + i);
        var badge = document.getElementById('nm-stale-' + i);
        if (!slide || !badge) continue;
        var ts = slide.dataset.timestamp;
        if (!ts) { badge.style.display = 'none'; continue; }
        try {
            var age = now - new Date(ts).getTime();
            badge.style.display = (age > _NM_STALE_MS) ? '' : 'none';
        } catch(e) { badge.style.display = 'none'; }
    }
}

function _nmStartAuto(nodeCount) {
    // Only start if not already running - prevents 2s DOM refresh from resetting
    // the 5s cycle before it can fire (would never advance if always restarted)
    if (_nmAutoId) return;
    _nmAutoId = setInterval(function() {
        if (!_nmPinned) _nmShowSlide((_nmCurrent + 1) % nodeCount, nodeCount);
    }, _NM_CYCLE_MS);
}

function _nmStopAuto() {
    if (_nmAutoId) { clearInterval(_nmAutoId); _nmAutoId = null; }
}

// Global pin handler called by dot onclick in dashboard_health.html partial
window.nmPinSlide = function(idx) {
    var carousel = document.getElementById('nm-carousel');
    if (!carousel) return;
    var nodeCount = parseInt(carousel.dataset.nodeCount, 10);

    if (_nmPinned && _nmCurrent === idx) {
        // Toggle off: unpin and resume auto-cycling
        _nmPinned = false;
        document.querySelectorAll('.nm-dot').forEach(function(d) { d.classList.remove('pinned'); });
        _nmStartAuto(nodeCount);
    } else {
        // Pin this slide
        _nmPinned = true;
        _nmStopAuto();
        _nmShowSlide(idx, nodeCount);
        document.querySelectorAll('.nm-dot').forEach(function(d) { d.classList.remove('pinned'); });
        var dot = document.getElementById('nm-dot-' + idx);
        if (dot) dot.classList.add('pinned');
    }
};
// ---- End persistent carousel state ----

// Shared response handler - used by refreshAll() and dropdown handlers in dashboard_stats.html
function applyResponse(response, targetSelector) {
    if (response.status === 401) {
        if (!window._cidxRedirecting) {
            window._cidxRedirecting = true;
            window.location.href = '/login';
            setTimeout(function() { window._cidxRedirecting = false; }, 3000);
        }
        return Promise.resolve();
    }
    if (response.ok) {
        return response.text().then(function(html) {
            var el = document.querySelector(targetSelector);
            if (el) {
                el.innerHTML = html;
                // After health section refresh, rebind carousel with persistent state
                if (targetSelector === '#health-section') {
                    if (typeof window.nmRebindCarousel === 'function') {
                        window.nmRebindCarousel();
                    }
                }
            }
        });
    }
    return Promise.resolve();
}

function refreshAll() {
    // Re-entrancy guard: skip if a refresh cycle is already in flight
    if (_refreshInProgress) return;
    _refreshInProgress = true;

    // Story #69: Surgical DOM updates - refresh ONLY data sections, not dropdowns

    // Preserve current filter selections during auto-refresh
    // Use optional chaining because elements may not exist on first page load
    const timeFilter = document.getElementById('time-filter')?.value || '24h';
    const apiFilter = document.getElementById('api-filter')?.value || '60';

    // Fire all 4 requests in parallel using fetch(); use Promise.allSettled so
    // one failure does not block the others from updating the DOM.
    // Story #69: Granular refresh targets - dropdowns stay untouched
    // Story #201: Recent Activity hardcoded to 24h (no dropdown)
    Promise.allSettled([
        fetch('/admin/partials/dashboard-health', _fetchOpts),
        fetch(`/admin/partials/dashboard-job-counts?time_filter=${timeFilter}`, _fetchOpts),
        fetch('/admin/partials/dashboard-recent-jobs?recent_filter=24h', _fetchOpts),
        fetch(`/admin/partials/dashboard-api-metrics?api_filter=${apiFilter}`, _fetchOpts)
    ]).then(function(results) {
        var updates = [];
        var targets = [
            '#health-section',
            '#job-counts-data',
            '#recent-jobs-tbody',
            '#api-metrics-data'
        ];
        results.forEach(function(result, i) {
            if (result.status === 'fulfilled') {
                updates.push(applyResponse(result.value, targets[i]));
            }
        });
        return Promise.all(updates);
    }).finally(function() {
        _refreshInProgress = false;
    });
}

// Start auto-refresh on page load (every 2 seconds for responsive metrics)
document.addEventListener('DOMContentLoaded', function() {
    autoRefreshInterval = setInterval(refreshAll, 2000);
});

// Cleanup on page unload
window.addEventListener('beforeunload', function() {
    if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
    }
});
</script>
{% endblock %}
