<!-- Story #684: Dependency Map dashboard background-job progress partial -->
<div id="depmap-job-status"
     hx-get="/admin/partials/depmap-job-status?job_id={{ job_id }}"
     hx-trigger="every 2s"
     hx-swap="outerHTML">
    <div style="margin: 1rem 0;">
        <div style="background: var(--pico-muted-border-color); border-radius: 4px; height: 24px; overflow: hidden;">
            <div style="background: var(--pico-primary); height: 100%; width: {{ progress }}%; transition: width 0.3s ease;"></div>
        </div>
        <p style="margin-top: 0.5rem; color: var(--pico-muted-color);">
            Processing {{ progress_info }}...
        </p>
        <button class="contrast"
                id="depmap-stop-btn"
                style="width: 100%; font-size: 0.85rem; padding: 0.4rem 0.6rem; margin-top: 0.25rem;"
                onclick="depmapStopAnalysis(this)">
            Stop Analysis
        </button>
        <div id="depmap-trigger-status" style="font-size: 0.9rem;"></div>
    </div>
    <script>
    if (!window._depmapStopDefined) {
        window._depmapStopDefined = true;
        window.depmapStopAnalysis = function(btn) {
            btn.disabled = true;
            btn.textContent = 'Stopping...';
            var statusEl = document.getElementById('depmap-trigger-status');
            fetch('/admin/dependency-map/cancel', {method: 'POST', headers: {'X-Requested-With': 'XMLHttpRequest'}})
                .then(function(r) { return r.json().then(function(body) { return {status: r.status, body: body}; }); })
                .then(function(res) {
                    if (!statusEl) return;
                    if (res.status === 200 && res.body.success) {
                        statusEl.innerHTML = '<small style="color: var(--pico-color-amber-550);">Stop signal sent -- analysis will halt shortly</small>';
                    } else if (res.status === 200 && res.body.status === 'no_active_job') {
                        statusEl.innerHTML = '<small style="color: var(--pico-muted-color);">No active analysis to stop</small>';
                    } else {
                        statusEl.innerHTML = '<small style="color: var(--pico-color-red-550);">Stop request failed</small>';
                        btn.disabled = false;
                        btn.textContent = 'Stop Analysis';
                    }
                })
                .catch(function() {
                    if (statusEl) statusEl.innerHTML = '<small style="color: var(--pico-color-red-550);">Stop request failed</small>';
                    btn.disabled = false;
                    btn.textContent = 'Stop Analysis';
                });
        };
    }
    </script>
</div>
