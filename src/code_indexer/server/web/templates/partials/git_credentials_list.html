{% if git_credentials %}
<figure>
    <table>
        <thead>
            <tr>
                <th>Forge</th>
                <th>Host</th>
                <th>Forge User</th>
                <th>Name/Email</th>
                <th>Label</th>
                <th>Token</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for cred in git_credentials %}
            <tr>
                <td>{{ cred.forge_type }}</td>
                <td>{{ cred.forge_host }}</td>
                <td>{{ cred.forge_username or '-' }}</td>
                <td>{{ cred.git_user_name or '-' }}<br><small>{{ cred.git_user_email or '' }}</small></td>
                <td>{{ cred.name or '-' }}</td>
                <td><code>****{{ cred.token_suffix }}</code></td>
                <td><small>{{ cred.created_at[:10] if cred.created_at else '-' }}</small></td>
                <td>
                    <button class="outline secondary" style="padding: 0.3rem 0.5rem; font-size: 0.8rem;" onclick="deleteCredential('{{ cred.credential_id }}', '{{ cred.name or cred.forge_host }}')">
                        Delete
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>
{% else %}
<p>No git credentials configured. Click "Add Credential" to set up your first forge PAT.</p>
{% endif %}
